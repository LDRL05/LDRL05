name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate snake
        uses: Platane/snk@v3
        with:
          github_user_name: LDRL05
          outputs: dist/github-contribution-grid-snake.svg

      - name: Push to output branch
        run: |
          git config --global user.name github-actions
          git config --global user.email github-actions@github.com
          git clone --depth=1 https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/LDRL05/LDRL05.git output
          cp dist/github-contribution-grid-snake.svg output/
          cd output
          git checkout --orphan output || git checkout output
          git add github-contribution-grid-snake.svg
          git commit -m "update snake" || echo "no changes"
          git push origin output --force